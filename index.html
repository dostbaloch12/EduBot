<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ===== Pro Typography: Sora (display) + Inter (body) ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=Noto+Nastaliq+Urdu:wght@500;700&display=swap" rel="stylesheet" />

    <!-- ===== SEO Basics ===== -->
    <title>EduBot | Pakistan's #1 AI Study Buddy — Board & Entry Test Prep</title>
    <meta name="description" content="EduBot Pakistan's premier AI study platform. FBISE, Punjab, Sindh, KPK, Balochistan boards + CSS, MDCAT, ECAT, PPSC prep. AI tutor, quizzes, past papers, voice learning in Urdu, Punjabi, Sindhi, Pashto & Balochi." />
    <meta name="keywords" content="EduBot, Pakistan education, AI tutor, MDCAT, ECAT, CSS prep, PPSC, FBISE, board exams, online study, matric, intermediate, FSc, ICS" />
    <meta name="author" content="EduBot Pakistan" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://edubot.pk/" />

    <!-- ===== Open Graph (Facebook / WhatsApp share) ===== -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="EduBot | Pakistan's #1 AI Study Buddy" />
    <meta property="og:description" content="AI tutor, quizzes & test prep for Pakistani students. CSS, MDCAT, ECAT, PPSC & all boards. 6 languages." />
    <meta property="og:url" content="https://edubot.pk/" />
    <meta property="og:site_name" content="EduBot" />
    <meta property="og:locale" content="en_PK" />

    <!-- ===== Twitter Card ===== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="EduBot | Pakistan's #1 AI Study Buddy" />
    <meta name="twitter:description" content="AI tutor, quizzes & test prep for Pakistani students in 6 languages." />

    <!-- ===== Theme ===== -->
    <meta name="theme-color" content="#07061d" />

    <!-- ===== Structured Data (Google rich results) ===== -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EducationalOrganization",
      "name": "EduBot",
      "description": "AI-powered study platform for Pakistani students",
      "url": "https://edubot.pk",
      "areaServed": "PK",
      "knowsLanguage": ["en", "ur", "pa", "sd", "ps", "bal"]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
